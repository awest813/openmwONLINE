# nginx configuration — OpenMW WASM non-pthread (single-threaded) build
#
# Use this for the SINGLE-THREADED build (openmw.html produced with
# -DOPENMW_EXPERIMENTAL_WASM_PTHREADS=OFF).
#
# This build does NOT require the COOP/COEP cross-origin isolation headers, so
# it can be served from any static host (GitHub Pages, Netlify free tier,
# Cloudflare Pages, S3, etc.) without special header configuration.
#
# Differences from the pthread build (nginx.conf):
#   * No Cross-Origin-Opener-Policy / Cross-Origin-Embedder-Policy headers.
#   * Background video at the main menu will NOT play (expected behaviour).
#   * Multi-threaded physics, NavMesh, and audio streaming run synchronously.
#
# For the full pthread build, use nginx.conf instead.
#
# Usage:
#   1. Copy the build artifacts into the directory named in `root`.
#   2. Adjust `server_name` and the `root` path.
#   3. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name example.com;

    # Remove this redirect if you are not using HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # -- TLS -----------------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    # ------------------------------------------------------------------------

    root  /var/www/openmw-wasm-nothreads;
    index openmw.html;

    # ── Recommended security / caching headers ───────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;

    # NOTE: COOP/COEP headers are intentionally absent for this build.
    # Adding them would cause no harm but they are not required.

    location = /openmw.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.wasm$ {
        add_header Content-Type "application/wasm" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.js$ {
        add_header Content-Type "application/javascript" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.data$ {
        add_header Content-Type "application/octet-stream" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    gzip on;
    gzip_types text/html application/javascript application/wasm;
    gzip_min_length 1024;
}
