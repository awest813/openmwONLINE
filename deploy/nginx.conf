# nginx configuration — OpenMW WASM pthread build
#
# Use this for the FULL pthread build (openmw.html produced with
# -DOPENMW_EXPERIMENTAL_WASM_PTHREADS=ON).
#
# The Cross-Origin-Opener-Policy and Cross-Origin-Embedder-Policy headers are
# MANDATORY for this build; without them SharedArrayBuffer is unavailable and
# the pthread worker threads will not start.
#
# For the non-pthread build, use nginx-no-threads.conf instead.
#
# Usage:
#   1. Copy the three build artifacts into the directory named in `root`:
#        openmw.html   openmw.js   openmw.wasm   openmw.data (if present)
#   2. Adjust `server_name` and the `root` path.
#   3. For HTTPS (required by most production hosts), add your SSL certificate
#      paths and uncomment the HTTPS server block.
#   4. nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name example.com;

    # Redirect HTTP → HTTPS in production.
    # Comment this out for plain HTTP on a LAN/local host.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # -- TLS -----------------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    # ------------------------------------------------------------------------

    # Serve build artifacts from this directory.
    root /var/www/openmw-wasm;
    index openmw.html;

    # ── Cross-origin isolation headers (REQUIRED for pthread build) ──────────
    #
    # These enable SharedArrayBuffer and Atomics in the browser, which the
    # Emscripten pthread runtime depends on.  Both headers must be present.
    #
    add_header Cross-Origin-Opener-Policy  "same-origin"  always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;

    # ── Recommended security / caching headers ───────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options        "SAMEORIGIN" always;

    # Disable caching for the HTML entry point so that users always get the
    # latest build.
    location = /openmw.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ── MIME types for WASM/JS assets ────────────────────────────────────────
    location ~* \.wasm$ {
        add_header Content-Type "application/wasm" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        # WASM files are content-addressed; cache aggressively.
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ~* \.js$ {
        add_header Content-Type "application/javascript" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ~* \.data$ {
        add_header Content-Type "application/octet-stream" always;
        add_header Cross-Origin-Opener-Policy  "same-origin"  always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # Gzip compression for text assets
    gzip on;
    gzip_types text/html application/javascript application/wasm;
    gzip_min_length 1024;
}
